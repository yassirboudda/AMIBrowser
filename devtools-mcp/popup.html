<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="#4FC3F7" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" fill="#4FC3F7"/>
          <line x1="12" y1="2" x2="12" y2="6" stroke="#4FC3F7" stroke-width="2"/>
          <line x1="12" y1="18" x2="12" y2="22" stroke="#4FC3F7" stroke-width="2"/>
          <line x1="2" y1="12" x2="6" y2="12" stroke="#4FC3F7" stroke-width="2"/>
          <line x1="18" y1="12" x2="22" y2="12" stroke="#4FC3F7" stroke-width="2"/>
        </svg>
        <span class="title">DevTools MCP Logger</span>
      </div>
      <div id="server-status" class="status-dot disconnected" title="MCP Server status"></div>
    </div>

    <div id="server-warning" class="warning hidden">
      <span>⚠ MCP server not running</span>
      <small>Start it with: <code>node server.js</code> in mcp-server/</small>
    </div>

    <div class="tab-info">
      <div id="tab-url" class="tab-url">Loading...</div>
    </div>

    <div class="controls">
      <button id="toggle-btn" class="btn btn-activate" disabled>
        <span class="btn-icon">●</span>
        <span id="toggle-text">Activate</span>
      </button>
      <button id="journal-btn" class="btn btn-secondary" title="Open Log Journal">
        <span>📋 Journal</span>
      </button>
    </div>

    <div id="stats" class="stats hidden">
      <div class="stat">
        <span class="stat-label">Logs</span>
        <span id="stat-logs" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Errors</span>
        <span id="stat-errors" class="stat-value error-text">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Network</span>
        <span id="stat-network" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Console</span>
        <span id="stat-console" class="stat-value">0</span>
      </div>
    </div>

    <div class="footer">
      <small>Data sent to MCP server → GitHub Copilot</small>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
